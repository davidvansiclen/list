<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pantry — Grocery List</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F2EB;
    --bg-card: #FDFAF4;
    --bg-card2: #F0EDE6;
    --ink: #1C1A16;
    --ink-mid: #5A5650;
    --ink-light: #9A9690;
    --accent-chef: #2D6A4F;
    --accent-chef-bg: #D8EFDF;
    --accent-costco: #1B4F8A;
    --accent-costco-bg: #D6E4F5;
    --accent-pcc: #8B3A2A;
    --accent-pcc-bg: #F5DDD8;
    --tag-indian: #7B4F10;
    --tag-indian-bg: #F5E6C8;
    --tag-med: #1B5E52;
    --tag-med-bg: #C8EBE4;
    --tag-mex: #7A1F1F;
    --tag-mex-bg: #F5D0C8;
    --tag-all: #3D2F7A;
    --tag-all-bg: #DDD8F5;
    --border: rgba(28,26,22,0.12);
    --border-strong: rgba(28,26,22,0.22);
    --radius: 6px;
    --radius-lg: 12px;
    --shadow: 0 1px 4px rgba(28,26,22,0.08);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    background: var(--ink);
    color: var(--bg);
    padding: 2rem 2.5rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid var(--ink);
  }
  .header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .site-title {
    font-family: 'DM Mono', monospace;
    font-size: 1.5rem;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--bg);
  }
  .site-title span {
    font-weight: 300;
    font-style: italic;
    color: rgba(245,242,235,0.55);
  }
  .clear-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(245,242,235,0.5);
    background: none;
    border: 1px solid rgba(245,242,235,0.2);
    padding: 5px 12px;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .clear-btn:hover { color: var(--bg); border-color: rgba(245,242,235,0.6); }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: rgba(245,242,235,0.08);
    color: rgba(245,242,235,0.6);
    border: 1px solid rgba(245,242,235,0.15);
    padding: 5px 14px;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { background: rgba(245,242,235,0.15); color: var(--bg); }
  .filter-btn.active { background: var(--bg); color: var(--ink); border-color: var(--bg); }

  /* Progress bar */
  .progress-bar-wrap {
    height: 3px;
    background: rgba(245,242,235,0.15);
    margin-top: 1.25rem;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: #8FD4A8;
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: rgba(245,242,235,0.45);
    margin-top: 5px;
    letter-spacing: 0.05em;
  }

  /* Main layout */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* Store section */
  .store-section {
    margin-bottom: 2.5rem;
  }
  .store-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1.5px solid var(--ink);
  }
  .store-pill {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 99px;
  }
  .pill-chef { background: var(--accent-chef-bg); color: var(--accent-chef); }
  .pill-costco { background: var(--accent-costco-bg); color: var(--accent-costco); }
  .pill-pcc { background: var(--accent-pcc-bg); color: var(--accent-pcc); }

  .store-title {
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--ink);
  }
  .store-cadence {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--ink-light);
    letter-spacing: 0.04em;
  }
  .store-count {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--ink-light);
  }

  /* Category block */
  .cat-block { margin-bottom: 1.25rem; }
  .cat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 6px;
    padding-left: 2px;
  }

  /* Items */
  .items-list { display: flex; flex-direction: column; gap: 4px; }
  .item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    transition: all 0.15s;
    position: relative;
  }
  .item-row:hover { border-color: var(--border-strong); }
  .item-row.checked {
    background: var(--bg-card2);
    opacity: 0.55;
  }
  .item-row.hidden { display: none; }

  /* Custom checkbox */
  .cb-wrap {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    position: relative;
  }
  .cb-wrap input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
    z-index: 2;
    margin: 0;
  }
  .cb-box {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border-strong);
    border-radius: 4px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    pointer-events: none;
  }
  .cb-wrap input:checked ~ .cb-box {
    background: var(--ink);
    border-color: var(--ink);
  }
  .cb-check {
    display: none;
    width: 10px;
    height: 10px;
  }
  .cb-wrap input:checked ~ .cb-box .cb-check { display: block; }

  .item-name {
    font-size: 0.88rem;
    font-weight: 400;
    color: var(--ink);
    flex: 1;
  }
  .item-note {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--ink-light);
    margin-left: auto;
    white-space: nowrap;
  }
  .item-tags {
    display: flex;
    gap: 3px;
    flex-shrink: 0;
  }
  .ctag {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.04em;
    padding: 2px 6px;
    border-radius: 99px;
    white-space: nowrap;
  }
  .ctag-indian { background: var(--tag-indian-bg); color: var(--tag-indian); }
  .ctag-med { background: var(--tag-med-bg); color: var(--tag-med); }
  .ctag-mex { background: var(--tag-mex-bg); color: var(--tag-mex); }
  .ctag-all { background: var(--tag-all-bg); color: var(--tag-all); }

  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-light);
    font-size: 1rem;
    line-height: 1;
    padding: 0 2px;
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .item-row:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: #8B3A2A; }

  /* Add item form */
  .add-section {
    margin-top: 10px;
  }
  .add-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-light);
    background: none;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius);
    padding: 7px 14px;
    cursor: pointer;
    width: 100%;
    transition: all 0.15s;
  }
  .add-toggle:hover { border-color: var(--ink); color: var(--ink); background: var(--bg-card); }
  .add-toggle .plus { font-size: 1rem; font-weight: 300; }

  .add-form {
    display: none;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 12px;
    margin-top: 4px;
    gap: 8px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .add-form.open { display: flex; }

  .form-group { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 120px; }
  .form-group label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-light);
  }
  .form-group input, .form-group select {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 6px 9px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--ink); }

  .add-submit {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    padding: 8px 16px;
    cursor: pointer;
    transition: opacity 0.15s;
    align-self: flex-end;
    height: 32px;
  }
  .add-submit:hover { opacity: 0.8; }
  .cancel-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: none;
    color: var(--ink-light);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 14px;
    cursor: pointer;
    height: 32px;
    align-self: flex-end;
  }
  .cancel-btn:hover { border-color: var(--border-strong); color: var(--ink); }

  /* Responsive */
  @media (max-width: 600px) {
    .header { padding: 1.25rem 1rem 1rem; }
    .main { padding: 1.5rem 1rem 3rem; }
    .item-note { display: none; }
    .site-title { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="site-title">pantry <span>/ grocery list</span></div>
    <button class="clear-btn" onclick="clearAll()">Clear checked</button>
  </div>
  <div class="filters">

    <button class="filter-btn" data-filter="med" onclick="setFilter('med')">Mediterranean</button>

  <div class="progress-bar-wrap">

  </div>
  <div class="progress-label" id="progress-label">0 of 0 items checked</div>
</header>

<main class="main" id="main-content"></main>

        { name: "Feta cheese", note: "Mediterranean salads", tags: ["med"] },
        { name: "Pita bread (fresh)", note: "Lebanese chicken & hummus", tags: ["med"] },
        { name: "Fresh paneer", note: "If preferred over Costco pack", tags: ["indian"] },
        { name: "Crème fraîche", note: "Richer than sour cream for sauces", tags: ["indian","med"] },
      ]},
    ]
  }
];

// State
let state = { checked: {}, customItems: {}, filter: 'all' };

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) state = { ...state, ...JSON.parse(saved) };
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function itemId(storeKey, catIdx, itemIdx) {
  return `${storeKey}__${catIdx}__${itemIdx}`;
}

function customId(storeKey, catKey) {
  return `custom__${storeKey}__${catKey}`;
}

function setFilter(f) {
  state.filter = f;
  saveState();
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  renderAll();
}

function clearAll() {
  state.checked = {};
  saveState();
  renderAll();
}

function toggleItem(id) {
  state.checked[id] = !state.checked[id];
  saveState();
  updateItemRow(id);
  updateProgress();
}

function updateItemRow(id) {
  const row = document.getElementById('row-' + id);
  if (!row) return;
  const cb = row.querySelector('input[type=checkbox]');
  if (cb) cb.checked = !!state.checked[id];
  row.classList.toggle('checked', !!state.checked[id]);
}

function deleteItem(id, isCustom) {
  if (isCustom) {
    // find and remove from customItems
    for (const [k, arr] of Object.entries(state.customItems || {})) {
      const idx = arr.findIndex(i => i._id === id);
      if (idx !== -1) { arr.splice(idx, 1); break; }
    }
  }
  delete state.checked[id];
  saveState();
  const row = document.getElementById('row-' + id);
  if (row) row.remove();
  updateProgress();
}

function toggleAddForm(formId, toggleId) {
  const form = document.getElementById(formId);
  const btn = document.getElementById(toggleId);
  const open = form.classList.toggle('open');
  btn.style.display = open ? 'none' : 'flex';
  if (open) form.querySelector('input')?.focus();
}

function closeAddForm(formId, toggleId) {
  const form = document.getElementById(formId);
  const btn = document.getElementById(toggleId);
  form.classList.remove('open');
  btn.style.display = 'flex';
  form.querySelectorAll('input').forEach(i => i.value = '');
}

function submitAdd(storeKey, catKey, formId, toggleId, listId) {
  const form = document.getElementById(formId);
  const nameInput = form.querySelector('.add-name');
  const noteInput = form.querySelector('.add-note');
  const tagSelect = form.querySelector('.add-tag');
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); return; }

  const customKey = `${storeKey}__${catKey}`;
  if (!state.customItems) state.customItems = {};
  if (!state.customItems[customKey]) state.customItems[customKey] = [];

  const id = `custom__${storeKey}__${catKey}__${Date.now()}`;
  const item = { _id: id, name, note: noteInput.value.trim(), tags: tagSelect.value ? [tagSelect.value] : ['indian','med','mex'] };
  state.customItems[customKey].push(item);
  saveState();

  const list = document.getElementById(listId);
  const rowEl = buildItemRow(item, id, true);
  list.insertAdjacentHTML('beforeend', rowEl);
  applyFilterToRow(id, item.tags);
  closeAddForm(formId, toggleId);
  updateProgress();
}

function buildItemRow(item, id, isCustom) {
  const tagsHtml = (item.tags || []).map(t => {
    const labels = { indian: 'Indian', med: 'Med', mex: 'Mexican', all: 'All' };
    return `<span class="ctag ctag-${t}">${labels[t] || t}</span>`;
  }).join('');
  const checked = state.checked[id] ? 'checked' : '';
  const checkedClass = state.checked[id] ? 'checked' : '';
  return `<div class="item-row ${checkedClass}" id="row-${id}" data-tags="${(item.tags||[]).join(',')}">
    <label class="cb-wrap">
      <input type="checkbox" ${checked} onchange="toggleItem('${id}')">
      <div class="cb-box">
        <svg class="cb-check" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1.5 5L4 7.5L8.5 2.5" stroke="#F5F2EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </label>
    <span class="item-name">${item.name}</span>
    ${item.note ? `<span class="item-note">${item.note}</span>` : ''}
    <div class="item-tags">${tagsHtml}</div>
    <button class="delete-btn" title="Remove" onclick="deleteItem('${id}', ${isCustom})">×</button>
  </div>`;
}

function buildAddForm(storeKey, catKey, catIdx) {
  const uid = `${storeKey}_${catKey.replace(/[^a-z0-9]/gi,'_')}_${catIdx}`;
  const formId = `form-${uid}`;
  const toggleId = `toggle-${uid}`;
  const listId = `list-${uid}`;
  return { formId, toggleId, listId, html: `
    <div class="add-section">
      <button class="add-toggle" id="${toggleId}" onclick="toggleAddForm('${formId}','${toggleId}')">
        <span class="plus">+</span> Add item
      </button>
      <div class="add-form" id="${formId}">
        <div class="form-group">
          <label>Item name</label>
          <input class="add-name" type="text" placeholder="e.g. Saffron" onkeydown="if(event.key==='Enter') submitAdd('${storeKey}','${catKey}','${formId}','${toggleId}','${listId}')">
        </div>
        <div class="form-group" style="flex:0.7">
          <label>Note</label>
          <input class="add-note" type="text" placeholder="e.g. Bulk, 2 oz">
        </div>
        <div class="form-group" style="flex:0.6; min-width:100px">
          <label>Cuisine</label>
          <select class="add-tag">
            <option value="">All</option>
            <option value="indian">Indian</option>
            <option value="med">Mediterranean</option>
            <option value="mex">Mexican</option>
          </select>
        </div>
        <button class="add-submit" onclick="submitAdd('${storeKey}','${catKey}','${formId}','${toggleId}','${listId}')">Add</button>
        <button class="cancel-btn" onclick="closeAddForm('${formId}','${toggleId}')">Cancel</button>
      </div>
    </div>` };
}

function applyFilterToRow(id, tags) {
  const row = document.getElementById('row-' + id);
  if (!row) return;
  const f = state.filter;
  const visible = f === 'all' || (tags || []).includes(f);
  row.classList.toggle('hidden', !visible);
}

function renderAll() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  storeData.forEach(store => {
    const storeEl = document.createElement('section');
    storeEl.className = 'store-section';
    storeEl.innerHTML = `<div class="store-header">
      <span class="store-pill ${store.pillClass}">${store.key === 'chef' ? "Chef's Supply" : store.label}</span>
      <div>
        <div class="store-title">${store.label}</div>
        <div class="store-cadence">${store.cadence}</div>
      </div>
      <span class="store-count" id="count-${store.key}"></span>
    </div>`;

    store.categories.forEach((cat, catIdx) => {
      const catEl = document.createElement('div');
      catEl.className = 'cat-block';

      const { formId, toggleId, listId, html: formHtml } = buildAddForm(store.key, cat.cat, catIdx);

      let itemsHtml = '';
      cat.items.forEach((item, itemIdx) => {
        const id = itemId(store.key, catIdx, itemIdx);
        itemsHtml += buildItemRow(item, id, false);
      });

      // Restore custom items for this cat
      const customKey = `${store.key}__${cat.cat}`;
      const customs = (state.customItems || {})[customKey] || [];
      customs.forEach(item => {
        itemsHtml += buildItemRow(item, item._id, true);
      });

      catEl.innerHTML = `<div class="cat-label">${cat.cat}</div>
        <div class="items-list" id="${listId}">${itemsHtml}</div>
        ${formHtml}`;
      storeEl.appendChild(catEl);
    });

    main.appendChild(storeEl);

    // Apply filter to all rows
    store.categories.forEach((cat, catIdx) => {
      cat.items.forEach((item, itemIdx) => {
        applyFilterToRow(itemId(store.key, catIdx, itemIdx), item.tags);
      });
      const customKey = `${store.key}__${cat.cat}`;
      const customs = (state.customItems || {})[customKey] || [];
      customs.forEach(item => applyFilterToRow(item._id, item.tags));
    });

    updateStoreCount(store.key);
  });

  updateProgress();
}

function updateStoreCount(storeKey) {
  const el = document.getElementById('count-' + storeKey);
  if (!el) return;
  const rows = document.querySelectorAll(`[id^="row-${storeKey}"], [id^="row-custom__${storeKey}"]`);
  const visible = [...rows].filter(r => !r.classList.contains('hidden'));
  const checked = visible.filter(r => r.classList.contains('checked'));
  el.textContent = visible.length ? `${checked.length}/${visible.length}` : '';
}

function updateProgress() {
  const rows = document.querySelectorAll('.item-row');
  const visible = [...rows].filter(r => !r.classList.contains('hidden'));
  const checked = visible.filter(r => r.classList.contains('checked'));
  const pct = visible.length ? Math.round(checked.length / visible.length * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${checked.length} of ${visible.length} items checked`;
  storeData.forEach(s => updateStoreCount(s.key));
}

loadState();
renderAll();
</script>
</body>
</html>
